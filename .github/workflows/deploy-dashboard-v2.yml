name: Deploy Organism Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - codex/review-organism-autonomy
    paths:
      - 'packages/dashboard-v2/**'
      - '.github/workflows/deploy-dashboard-v2.yml'

jobs:
  deploy-dashboard-v2:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_15YiitJlHCt2Y0XrBUeORrMB
      VERCEL_PROJECT_ID: prj_fcgDvPayOVeGjODL470QDNjWvkxu
    defaults:
      run:
        shell: bash
        working-directory: packages/dashboard-v2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/dashboard-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production settings
        run: npx vercel pull --yes --environment production --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel prebuilt output
        run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to production
        run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"

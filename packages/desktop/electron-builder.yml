appId: com.organism.desktop
productName: Organism
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - assets/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

extraMetadata:
  main: dist/main.js
